<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RSS Reader</title>
  
</head>
<body>
  <div class="container mt-5">
    <div class="row">
      <div class="col-md-6 mx-auto">
        <h1 class="text-center mb-4">RSS Reader</h1>
        
        <form>
          <div class="mb-3">
            <label for="rss-url" class="form-label">Ссылка RSS</label>
            <input 
              type="url" 
              class="form-control" 
              id="rss-url"
              name="url" 
              placeholder="https://example.com/rss"
              aria-label="url"
            >
            <div class="invalid-feedback"></div>
            <div class="feedback small mt-2"></div>
          </div>
          <button type="submit" class="btn btn-primary">Добавить</button>
        </form>
      </div>
    </div>
  </div>

  <!-- Статическое модальное окно Bootstrap -->
  <div class="modal fade" id="modal" tabindex="-1" aria-labelledby="modalLabel" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="modalLabel">Заголовок поста</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <p>Содержимое поста</p>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Закрыть</button>
          <a href="#" class="btn btn-primary" id="fullArticleLink" target="_blank" rel="noopener noreferrer">Читать полностью</a>
        </div>
      </div>
    </div>
  </div>


  <script type="module" src="/src/index.js"></script>
</body>
</html>
