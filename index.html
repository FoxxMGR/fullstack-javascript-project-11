<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RSS Reader</title>
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
  <div class="container mt-5">
    <div class="row">
      <div class="col-md-6 mx-auto">
        <h1 class="text-center mb-4">RSS Reader</h1>
        
        <!-- Изменения: добавлен name="url" для FormData и класс feedback для сообщений -->
        <form>
          <div class="mb-3">
            <label for="rss-url" class="form-label">Ссылка RSS</label>
            <input 
              type="url" 
              class="form-control" 
              id="rss-url"
              name="url" 
              placeholder="https://example.com/rss"
              required
            >
            <!-- Блок для сообщений об ошибках/успехе -->
            <div class="feedback small mt-2"></div>
          </div>
          <button type="submit" class="btn btn-primary">Добавить</button>
        </form>
      </div>
    </div>
  </div>
  <script type="module" src="/src/index.js"></script>
</body>
</html>
